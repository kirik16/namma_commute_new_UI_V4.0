name: Build Namma Commute APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
      - name: Find Flutter project
        id: find
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" | grep -v ".dart_tool" | grep -v "build/" | head -1)
          DIR=$(dirname "$PUBSPEC")
          echo "dir=$DIR" >> $GITHUB_OUTPUT
      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > ${{ steps.find.outputs.dir }}/android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> ${{ steps.find.outputs.dir }}/android/local.properties
      - name: Flutter pub get
        run: cd ${{ steps.find.outputs.dir }} && flutter pub get
      - name: Build APK
        run: cd ${{ steps.find.outputs.dir }} && flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: NammaCommute-V4-APK
          path: ${{ steps.find.outputs.dir }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
