name: Build Namma Commute APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Find Flutter project
        id: find
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" | grep -v ".dart_tool" | grep -v "build/" | head -1)
          DIR=$(dirname "$PUBSPEC")
          echo "✅ Found at: $DIR"
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Write local.properties
        run: |
          DIR=${{ steps.find.outputs.dir }}
          echo "sdk.dir=$ANDROID_SDK_ROOT"  > $DIR/android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> $DIR/android/local.properties
          echo "flutter.versionName=1.0.0" >> $DIR/android/local.properties
          echo "flutter.versionCode=1"     >> $DIR/android/local.properties

      - name: Generate App Icon
        run: |
          sudo apt-get install -y imagemagick -q
          DIR=${{ steps.find.outputs.dir }}
          RES=$DIR/android/app/src/main/res
          for spec in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            NAME="${spec%%:*}"; SIZE="${spec##*:}"
            mkdir -p $RES/mipmap-$NAME
            convert -size ${SIZE}x${SIZE} xc:"#08080F" \
              \( -size ${SIZE}x${SIZE} xc:none \
                 -fill "#FF6B35" \
                 -draw "roundrectangle $((SIZE/8)),$((SIZE/8)),$((SIZE*7/8)),$((SIZE*7/8)),$((SIZE/5)),$((SIZE/5))" \
              \) -composite \
              -fill white -gravity center \
              -font DejaVu-Sans-Bold \
              -pointsize $((SIZE*30/96)) \
              -annotate 0 "NC" \
              $RES/mipmap-$NAME/ic_launcher.png
            cp $RES/mipmap-$NAME/ic_launcher.png $RES/mipmap-$NAME/ic_launcher_round.png
          done
          echo "✅ Icons done"

      - name: Flutter pub get
        run: cd ${{ steps.find.outputs.dir }} && flutter pub get

      - name: Flutter analyze
        run: cd ${{ steps.find.outputs.dir }} && flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build APK
        run: cd ${{ steps.find.outputs.dir }} && flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NammaCommute-V4-APK
          path: ${{ steps.find.outputs.dir }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Done
        run: |
          APK="${{ steps.find.outputs.dir }}/build/app/outputs/flutter-apk/app-release.apk"
          [ -f "$APK" ] && echo "✅ APK Ready! Size: $(du -sh $APK | cut -f1)" || exit 1
